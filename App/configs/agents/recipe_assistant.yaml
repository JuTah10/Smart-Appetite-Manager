log:
  stdout_log_level: INFO

!include ../shared_config.yaml

apps:
  - name: recipe-assistant_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE, sam/}
      supports_streaming: true
      agent_name: "RecipeAssistant"
      display_name: "Chef Agent"
      model: *planning_model
      agent_init_function:
        module: "rate_limit_init"
        name: "setup_llm_rate_limit"
        base_path: "src"
        config:
          wait_seconds: ${LLM_MIN_CALL_INTERVAL_SECONDS, 1.0}

      instruction: |
        You are a router. Classify the user's request and delegate to the right agent.
        You have NO tools. Do not answer questions yourself — always delegate.

        ROUTING TABLE:
        1) peer_RecipeInventorySearch — recipes from what the user has in the inventory/pantry.
           "what can I cook", "what's in my pantry", "what proteins do I have", "what's expiring",
           "suggest meals from my inventory"
        2) peer_RecipeGeneralSearch — recipe discovery, search by name/cuisine/diet, random recipes,
           recipe details by ID, ingredient substitutes, unit conversions.
           "find pasta recipes", "vegetarian ideas", "surprise me", "how do I make X",
           "can I swap butter", "how many grams in 2 cups flour".

        3) peer_RecipeCookingSpecialist — help about a particular recipe, or any instructions related to cooking
           "my sauce is too thick", "is my chicken done", "convection oven temp",
           "how to store leftovers", "walk me through the roux", "dish tastes bland".

        4) peer_InventoryOrchestrator — inventory management (add, remove, update items).
           "add 2kg rice", "remove the milk", "update chicken quantity".

        DELEGATION:
        - Pass the user's full message plus any preferences (diet, cuisine, time, ingredients mentioned).
        - For cooking help, include any recipe context from the conversation.
        - Relay helper responses DIRECTLY — do NOT rewrite, summarize, or strip any content.
        - PRESERVE ```recipe_data blocks exactly as received.

      session_service:
        type: "sql"
        database_url: "${RECIPE_RESEARCH_DATABASE_URL, sqlite:///recipe_research.db}"
        default_behavior: "PERSISTENT"

      artifact_service: *default_artifact_service

      agent_card:
        description: >
          Chef Agent — The front-door for all recipe requests. Understands user intent
          and delegates to specialized helper agents. Handles requests like "what can I cook?",
          "find recipes from my inventory", "suggest meals", "show me Italian recipes",
          "surprise me with a recipe", "can I swap butter?", "how many grams in 2 cups?",
          "my sauce is too thick", "how do I know when chicken is done?", "how to store
          leftovers", or any recipe-related question. Routes inventory-based searches,
          general recipe exploration, recipe details, ingredient intelligence, and
          real-time cooking assistance to the right specialist.
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "recipe_routing"
            name: "Recipe Request Routing"
            description: "Classify recipe requests and delegate to inventory-based or general recipe search helpers."

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: true

      inter_agent_communication:
        allow_list: ["OrchestratorAgent", "RecipeInventorySearch", "RecipeGeneralSearch", "RecipeCookingSpecialist", "InventoryOrchestrator"]
        request_timeout_seconds: 120
