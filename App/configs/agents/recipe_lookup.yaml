log:
  stdout_log_level: INFO

!include ../shared_config.yaml

apps:
  - name: recipe-lookup_app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app

    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE, sam/}
      supports_streaming: true
      agent_name: "RecipeLookup"
      display_name: "Recipe Lookup (Online)"
      model: *general_model
      agent_init_function:
        module: "rate_limit_init"
        name: "setup_llm_rate_limit"
        base_path: "src"
        config:
          wait_seconds: ${LLM_MIN_CALL_INTERVAL_SECONDS, 1.0}

      instruction: |
        You are a recipe lookup assistant.

        Your job:
        1) Find recipes based on the user's ingredients, preferences, and dietary needs.
        2) Choose the right search tool:
           - If the user provides diet, cuisine, intolerances, or time constraints → use `complex_search`.
           - If the user only provides a simple ingredient list → use `get_top_3_meals`.
        3) Present results sorted by `final_score` (highest first). For each recipe, ALWAYS show:
           - The recipe image using markdown: ![Recipe Title](image_url)
           - Title, match score (as percentage), and the score explanation.
           - Ready time, servings, diets, cuisines when available.
           - Used and missing ingredient counts.
        4) When the user chooses a recipe, use `get_meal_details` to fetch full instructions.
        5) If the user asks "can I swap X?" or about substitutes, use `get_substitutes`.
        6) If the user asks about unit conversions, use `convert_amounts`.
        7) If the user provides free-text ingredient descriptions, use `parse_ingredients` to structure them.

        RESPONSE FORMAT — CRITICAL:
        When presenting recipe search results, you MUST:
        1) Show a human-readable summary with images (as described above).
        2) At the very end of your response, append a machine-readable JSON block wrapped in
           ```recipe_data ... ``` fences. This block must be a JSON array of recipe objects with
           these fields: id, title, image (full URL), readyInMinutes, servings, sourceUrl,
           usedIngredients (array of strings), missedIngredients (array of strings),
           usedIngredientCount, missedIngredientCount, diets (array), cuisines (array),
           scores (object with final_score, pantry_coverage_score, prep_time_score,
           preference_match_score, missing_ingredient_count, explanation).
        Use the EXACT values from the tool response. Example:
        ```recipe_data
        [{"id":"123","title":"Pasta","image":"https://...","scores":{"final_score":0.72,...},...}]
        ```

        IMPORTANT:
        - ALWAYS include the image for every recipe using ![title](url) markdown.
        - Always use EXACT data from tool responses — never fabricate recipes or scores.
        - Always present the score explanation to help users understand why a recipe ranked where it did.
        - If a search returns 0 results, the tool will automatically try fallback strategies.

      Tool use: |
        - `complex_search`: Advanced search with filters. Example: `complex_search(ingredients='chicken,rice', diet='vegetarian', cuisine='italian', max_ready_time=30)`.
        - `get_top_3_meals`: Quick ingredient-based search. Example: `get_top_3_meals(ingredients='chicken,rice')`. Returns scored results.
        - `search_meals`: Legacy search that auto-delegates to complex_search when filters are present.
        - `get_meal_details`: Get full recipe with analyzed instructions. Example: `get_meal_details(meal_id='12345')`.
        - `get_substitutes`: Find ingredient substitutes. Example: `get_substitutes(ingredient_name='butter')`.
        - `convert_amounts`: Convert units. Example: `convert_amounts(ingredient_name='flour', source_amount=2, source_unit='cups', target_unit='grams')`.
        - `parse_ingredients`: Parse free-text ingredients. Example: `parse_ingredients(ingredient_list='2 cups flour\n1 tsp salt')`.

      tools:
        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "complex_search"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "get_top_3_meals"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "search_meals"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "get_meal_details"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "get_random_meal"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "parse_ingredients"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "convert_amounts"

        - tool_type: python
          component_base_path: "src"
          component_module: "recipe_agent.mealdb_tools"
          function_name: "get_substitutes"

      session_service:
        type: ${PERSISTENCE_TYPE, memory}
        database_url: ${CUSTOM_AGENT_DATABASE_URL,}

      artifact_service: *default_artifact_service

      agent_card:
        description: >
          Looks up recipes online using Spoonacular with advanced filtering (diet, cuisine,
          intolerances, prep time), transparent scoring, and ingredient intelligence
          (substitutes, unit conversion, ingredient parsing). Use this agent when the user
          asks for a recipe, meal ideas, "what can I cook with X", wants filtered recipe
          search, needs ingredient substitutes, or unit conversions.
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "recipe_search"
            name: "Search recipes"
            description: "Find recipes by ingredient with optional diet, cuisine, intolerance, and time filters."
          - id: "recipe_complex_search"
            name: "Advanced recipe search"
            description: "Search with diet, cuisine, intolerance filters and transparent scoring."
          - id: "recipe_details"
            name: "Get recipe details"
            description: "Fetch full ingredients, analyzed instructions, and nutrition for a selected recipe."
          - id: "ingredient_substitutes"
            name: "Ingredient substitutes"
            description: "Find substitutes for an ingredient."
          - id: "unit_conversion"
            name: "Convert ingredient amounts"
            description: "Convert ingredient measurements between units."
          - id: "parse_ingredients"
            name: "Parse ingredients"
            description: "Parse free-text ingredient descriptions into structured data."

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: true

      inter_agent_communication:
        allow_list: ["OrchestratorAgent", "RecipeResearchAgent"]
        request_timeout_seconds: 60
